<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1321"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="315" rx="400" ry="200" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(540, 180)">
    <rect x="0" y="0" width="56" height="56" rx="16" fill="#14b8a6"/>
    <path d="M28 14c3.5-3.5 6-4 11-4a11 11 0 0 1 11 11c0 4.6-1.5 8.1-4 11l-18 18-18-18c-2.5-2.9-4-6.4-4-11a11 11 0 0 1 11-11c5 0 7.5 0.5 11 4z" fill="white" transform="translate(9, 12) scale(0.63)"/>
  </g>

  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="64" fill="white">HerWellness</text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="url(#accent)">Your symptoms, finally visible.</text>

  <!-- Subtext -->
  <text x="600" y="440" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#64748b">Track symptoms · Generate clinical summaries · Practice for appointments</text>

  <!-- Decorative line -->
  <rect x="450" y="480" width="300" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
</svg>
